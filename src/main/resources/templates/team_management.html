<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Management — EcoRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- ① Config BEFORE CDN -->
    <script>
        window.tailwind = window.tailwind || {};
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Outfit', 'sans-serif'] } } }
        };
        // Immediate execution to prevent flash of wrong theme
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <!-- ② CDN after config -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        html, body { background-color: #f8fafc; min-height: 100%; transition: background-color 0.4s ease; }
        html.dark, html.dark body { background-color: #0f172a; }
        * { transition: background-color 0.25s ease, border-color 0.2s ease, color 0.15s ease, box-shadow 0.2s ease; }
    </style>
</head>
<body class="min-h-screen font-sans pb-12 text-gray-900 dark:text-slate-100">

    <!-- ── HEADER ──────────────────────────────────────────────────────────── -->
    <header class="sticky top-0 z-50 border-b border-gray-200 dark:border-slate-800
                   bg-white/90 dark:bg-slate-900/60 backdrop-blur-md shadow-sm dark:shadow-none">
         <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">

            <!-- Logo + Company name -->
            <div class="flex items-center gap-3">
                <a th:href="@{/dashboard}" class="flex items-center gap-3">
                    <div class="inline-flex items-center justify-center w-10 h-10 rounded-xl
                                bg-emerald-100 dark:bg-emerald-950/60
                                border border-emerald-300 dark:border-emerald-500/30
                                text-emerald-600 dark:text-emerald-400">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18v-5.25m0 0a6.01 6.01 0 0 0 1.5-.189m-1.5.189a6.01 6.01 0 0 1-1.5-.189m3.75 7.478a12.06 12.06 0 0 1-4.5 0m3.75 2.383a14.406 14.406 0 0 1-3 0M14.25 18v-.192c0-.983.658-1.823 1.508-2.316a7.5 7.5 0 1 0-7.517 0c.85.493 1.509 1.333 1.509 2.316V18"/>
                        </svg>
                    </div>
                    <div class="flex flex-col leading-tight">
                        <span class="text-xl font-bold tracking-tight text-gray-900 dark:text-white">EcoRoute</span>
                        <span class="text-xs font-semibold text-emerald-600 dark:text-emerald-400 -mt-0.5"
                              th:text="${activeCompany}">Company Name</span>
                    </div>
                </a>
            </div>

            <div class="flex items-center gap-2 sm:gap-3">
                <!-- User info -->
                <div class="hidden sm:flex flex-col text-right">
                    <span class="text-xs text-gray-400 dark:text-slate-500 font-semibold uppercase tracking-wider"
                          th:text="${role}">ROLE</span>
                    <span class="text-sm font-semibold text-gray-800 dark:text-slate-200"
                          th:text="${activeUser}">username</span>
                </div>

                <!-- Role badge -->
                <span th:class="${role == 'LOGISTICS_MANAGER'
                    ? 'bg-emerald-100 text-emerald-700 border border-emerald-300 dark:bg-emerald-500/10 dark:text-emerald-400 dark:border-emerald-500/30'
                    : 'bg-amber-100 text-amber-700 border border-amber-300 dark:bg-amber-500/10 dark:text-amber-400 dark:border-amber-500/30'}
                    + ' px-3 py-1 text-xs font-bold rounded-full uppercase tracking-wider'"
                      th:text="${role == 'LOGISTICS_MANAGER' ? 'Manager' : 'Auditor'}">Manager</span>

                <!-- Theme Toggle -->
                <button onclick="toggleTheme()" title="Toggle theme"
                        class="p-2.5 rounded-xl bg-gray-100 dark:bg-slate-800/80
                               border border-gray-200 dark:border-slate-700
                               text-gray-500 dark:text-yellow-300
                               hover:scale-110 transition-all duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 hidden dark:block">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 block dark:hidden">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/>
                    </svg>
                </button>

                <!-- Logout -->
                <form th:action="@{/logout}" method="post">
                    <button type="submit"
                            class="p-2.5 rounded-xl bg-gray-100 dark:bg-slate-800/80
                                   border border-gray-200 dark:border-slate-700
                                   hover:bg-red-50 dark:hover:bg-red-950/40
                                   hover:border-red-300 dark:hover:border-red-500/30
                                   text-gray-500 dark:text-slate-400
                                   hover:text-red-600 dark:hover:text-red-400 transition-all duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75"/>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-10">
        <!-- Back link -->
        <div class="mb-6">
            <a th:href="@{/dashboard}" class="inline-flex items-center gap-1.5 text-sm text-emerald-600 hover:text-emerald-500 dark:text-emerald-400 dark:hover:text-emerald-300 font-semibold transition-colors duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                </svg>
                Back to Dashboard
            </a>
        </div>

        <!-- ── ALERTS ──────────────────────────────────────────────────────── -->
        <div th:if="${error}"
             class="mb-8 bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-500/30
                     text-red-700 dark:text-red-300 px-6 py-4 rounded-2xl flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-red-500 shrink-0">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>
            </svg>
            <span th:text="${error}">Error message</span>
        </div>
        <div th:if="${success}"
             class="mb-8 bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-200 dark:border-emerald-500/30
                     text-emerald-700 dark:text-emerald-300 px-6 py-4 rounded-2xl flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-emerald-500 shrink-0">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
            </svg>
            <span th:text="${success}">Success message</span>
        </div>

        <!-- ── MAIN GRID ───────────────────────────────────────────────────── -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">

             <!-- LEFT PANEL: Add Member Form -->
             <div class="lg:col-span-1 bg-white dark:bg-slate-900/50 border border-gray-200 dark:border-slate-800 rounded-3xl p-6 shadow-sm dark:shadow-none">
                 <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-5 flex items-center gap-2">
                     <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-emerald-500">
                         <path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
                     </svg>
                     Add Team Member
                 </h3>
                 <form th:action="@{/dashboard/team}" th:object="${teamForm}" method="post" class="space-y-4">
                     <!-- Validation errors alert banner -->
                     <div th:if="${#fields.hasErrors('*')}"
                          class="mb-4 text-xs text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-500/30 rounded-xl px-4 py-3 space-y-1">
                         <span class="font-bold">Validation Errors:</span>
                         <ul class="list-disc list-inside mt-1 space-y-0.5">
                             <li th:each="err : ${#fields.errors('*')}" th:text="${err}">Error</li>
                         </ul>
                     </div>
                     
                     <div class="space-y-1">
                         <label class="text-xs font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wider block">Username</label>
                         <input type="text" th:field="*{username}" required placeholder="e.g. janesmith"
                                class="w-full bg-gray-50 dark:bg-slate-950/60 border border-gray-300 dark:border-slate-700 rounded-xl py-2.5 px-4 text-gray-900 dark:text-slate-200 placeholder-gray-400 dark:placeholder-slate-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-sm">
                     </div>
                     <div class="space-y-1">
                         <label class="text-xs font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wider block">Email</label>
                         <input type="email" th:field="*{email}" required placeholder="e.g. jane@company.com"
                                pattern="^[A-Za-z0-9._%+-]+@(gmail\.com|[A-Za-z0-9.-]+\.[A-Za-z]{2,})$"
                                title="Email must be a valid address ending with @gmail.com or a registered corporate domain."
                                class="w-full bg-gray-50 dark:bg-slate-950/60 border border-gray-300 dark:border-slate-700 rounded-xl py-2.5 px-4 text-gray-900 dark:text-slate-200 placeholder-gray-400 dark:placeholder-slate-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-sm">
                     </div>
                     <div class="space-y-1">
                         <label class="text-xs font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wider block">Password</label>
                         <input type="password" th:field="*{password}" required placeholder="••••••••"
                                pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,30}$"
                                title="Password must be 8-30 characters long and include at least one uppercase letter, one lowercase letter, one number, and one special character."
                                class="w-full bg-gray-50 dark:bg-slate-950/60 border border-gray-300 dark:border-slate-700 rounded-xl py-2.5 px-4 text-gray-900 dark:text-slate-200 placeholder-gray-400 dark:placeholder-slate-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-sm">
                     </div>
                     <div class="space-y-1">
                         <label class="text-xs font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wider block">Role</label>
                         <select th:field="*{roleStr}" required
                                 class="w-full bg-gray-50 dark:bg-slate-950/60 border border-gray-300 dark:border-slate-700 rounded-xl py-2.5 px-4 text-gray-900 dark:text-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-sm">
                             <option value="LOGISTICS_MANAGER">Logistics Manager</option>
                             <option value="AUDITOR">Compliance Auditor</option>
                         </select>
                     </div>
                     <button type="submit"
                             class="w-full mt-2 bg-emerald-500 hover:bg-emerald-400 text-white dark:text-slate-950 font-bold py-3 rounded-xl shadow-lg shadow-emerald-500/20 active:scale-[0.98] transition-all duration-300 text-sm uppercase tracking-wider">
                         Create Account
                     </button>
                 </form>
             </div>

            <!-- RIGHT PANEL: Current Team Members -->
            <div class="lg:col-span-2 bg-white dark:bg-slate-900/50 border border-gray-200 dark:border-slate-800 rounded-3xl p-6 shadow-sm dark:shadow-none">
                <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-5 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-emerald-500">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.109A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766v-.109A12.318 12.318 0 0 1 8.624 19c2.331 0 4.512.645 6.376 1.766Zm-6.75-6a3.75 3.75 0 1 0 0-7.5 3.75 3.75 0 0 0 0 7.5ZM12.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
                    </svg>
                    Current Team Members
                </h3>

                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead>
                            <tr class="border-b border-gray-200 dark:border-slate-800 text-gray-400 dark:text-slate-500 text-xs font-bold uppercase tracking-wider">
                                <th class="py-3.5 px-4">Username</th>
                                <th class="py-3.5 px-4">Email Address</th>
                                <th class="py-3.5 px-4">Role</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 dark:divide-slate-800/60">
                            <tr th:each="m : ${teamMembers}"
                                class="hover:bg-gray-50 dark:hover:bg-slate-900/80 transition-colors duration-150">
                                <td class="py-4 px-4 font-bold text-gray-700 dark:text-slate-300 text-sm"
                                    th:text="${m.username}">user1</td>
                                <td class="py-4 px-4 text-gray-600 dark:text-slate-400 text-sm"
                                    th:text="${m.email != null ? m.email : 'No email'}">user1@company.com</td>
                                <td class="py-4 px-4">
                                    <span th:class="${m.role.name() == 'LOGISTICS_MANAGER'
                                        ? 'bg-emerald-100 text-emerald-700 border border-emerald-300 dark:bg-emerald-500/10 dark:text-emerald-400 dark:border-emerald-500/30'
                                        : m.role.name() == 'SYSTEM_ADMIN'
                                        ? 'bg-red-100 text-red-700 border border-red-300 dark:bg-red-500/10 dark:text-red-400 dark:border-red-500/30'
                                        : 'bg-amber-100 text-amber-700 border border-amber-300 dark:bg-amber-500/10 dark:text-amber-400 dark:border-amber-500/30'}
                                        + ' px-2.5 py-0.5 text-[10px] font-bold rounded-lg uppercase tracking-wider'"
                                          th:text="${m.role.name() == 'LOGISTICS_MANAGER' ? 'Manager' : m.role.name() == 'SYSTEM_ADMIN' ? 'System Admin' : 'Auditor'}">Manager</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleTheme() {
            var isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
    </script>
</body>
</html>
