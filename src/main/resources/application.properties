# Datasource Configuration (using environment variables with fallbacks)
spring.datasource.url=jdbc:mysql://localhost:3306/ecoroute_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_DB_USERNAME:root}
spring.datasource.password=${MYSQL_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configurations
# NOTE: 'create' drops & recreates all tables on startup — ensures clean multi-tenant schema.
# Change to 'update' once you want to preserve data across restarts.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Seed Data Configurations (runs data.sql after JPA schema creation)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Logging settings
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.ecoroute=DEBUG
