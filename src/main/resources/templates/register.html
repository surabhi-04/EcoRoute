<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenant Registration - EcoRoute Green Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- ① Set Tailwind config BEFORE the CDN loads -->
    <script>
        window.tailwind = window.tailwind || {};
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Outfit', 'sans-serif'] } } }
        };
        // Immediate execution to prevent flash of wrong theme
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <!-- ② Load Tailwind CDN after config is set -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        html, body { background-color: #f8fafc; transition: background-color 0.4s ease, color 0.3s ease; }
        html.dark, html.dark body { background-color: #0b0f19; }
        * { transition: background-color 0.25s ease, border-color 0.2s ease, color 0.15s ease, box-shadow 0.2s ease; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-sans relative transition-colors duration-300
             bg-slate-50 text-slate-900 dark:bg-[#0b0f19] dark:text-slate-100">

    <!-- Glow blobs -->
    <div class="absolute -top-16 -left-16 w-72 h-72 bg-emerald-400/5 dark:bg-emerald-500/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-16 -right-16 w-72 h-72 bg-teal-400/5 dark:bg-teal-500/5 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Theme Toggle -->
    <button onclick="toggleTheme()" title="Toggle theme"
            class="fixed top-5 right-5 z-50 p-2.5 rounded-xl
                   bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700
                   text-slate-500 dark:text-yellow-300
                   shadow-md hover:scale-110 transition-all duration-300">
        <!-- Sun — visible in dark mode -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
             class="w-5 h-5 hidden dark:block">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
        </svg>
        <!-- Moon — visible in light mode -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
             class="w-5 h-5 block dark:hidden">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/>
        </svg>
    </button>

    <div class="relative w-full max-w-lg">
        <!-- Card -->
        <div class="relative p-8 bg-white shadow-xl border border-slate-200/60 rounded-2xl dark:bg-slate-900/60 dark:backdrop-blur-md dark:border-slate-800">

            <!-- Branding -->
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl
                            bg-emerald-50 dark:bg-emerald-950/60
                            border border-emerald-200 dark:border-emerald-500/30
                            text-emerald-600 dark:text-emerald-400 mb-3 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 18v-5.25m0 0a6.01 6.01 0 0 0 1.5-.189m-1.5.189a6.01 6.01 0 0 1-1.5-.189m3.75 7.478a12.06 12.06 0 0 1-4.5 0m3.75 2.383a14.406 14.406 0 0 1-3 0M14.25 18v-.192c0-.983.658-1.823 1.508-2.316a7.5 7.5 0 1 0-7.517 0c.85.493 1.509 1.333 1.509 2.316V18"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white mb-1">Company Onboarding</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Register your logistics firm to the EcoRoute platform</p>
            </div>

            <!-- Registration Form -->
            <form th:action="@{/register/tenant}" th:object="${form}" method="post" class="space-y-4">
                
                <!-- Error Alert -->
                <div th:if="${error != null or #fields.hasErrors('*')}"
                     class="mb-5 bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-500/30
                             text-red-700 dark:text-red-300 px-4 py-3 rounded-2xl text-sm flex flex-col gap-2">
                    <div class="flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 shrink-0 text-red-500">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>
                        </svg>
                        <span class="font-semibold" th:if="${error != null}" th:text="${error}">An error occurred.</span>
                        <span class="font-semibold" th:if="${#fields.hasErrors('*')}">Please correct the validation errors:</span>
                    </div>
                    <ul th:if="${#fields.hasErrors('*')}" class="list-disc list-inside pl-8 text-xs space-y-1">
                        <li th:each="err : ${#fields.errors('*')}" th:text="${err}">Validation Error</li>
                    </ul>
                </div>
                
                <h2 class="text-sm font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-wider mb-2">1. Company Details</h2>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Company Name -->
                    <div class="space-y-1">
                        <label for="companyName" class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Company Name</label>
                        <input type="text" id="companyName" th:field="*{companyName}" required
                               placeholder="e.g. EcoTrans Inc."
                               class="w-full text-slate-900 placeholder-slate-400 bg-slate-50 border border-slate-200 dark:text-white dark:placeholder-slate-500 dark:bg-slate-950/50 dark:border-slate-800 rounded-xl py-2.5 px-3 focus:outline-none focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 text-sm">
                    </div>

                    <!-- Business Sector -->
                    <div class="space-y-1">
                        <label for="industrySector" class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Business Sector</label>
                        <input type="text" id="industrySector" th:field="*{industrySector}" required
                               placeholder="e.g. Retail, Supply Chain"
                               class="w-full text-slate-900 placeholder-slate-400 bg-slate-50 border border-slate-200 dark:text-white dark:placeholder-slate-500 dark:bg-slate-950/50 dark:border-slate-800 rounded-xl py-2.5 px-3 focus:outline-none focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 text-sm">
                    </div>
                </div>

                <div class="border-t border-slate-200 dark:border-slate-800 my-4 pt-2"></div>
                <h2 class="text-sm font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-wider mb-2">2. Manager Account Setup</h2>

                <!-- Username -->
                <div class="space-y-1">
                    <label for="username" class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Manager Username</label>
                    <input type="text" id="username" th:field="*{username}" required
                           placeholder="e.g. ecomgr_smith"
                           class="w-full text-slate-900 placeholder-slate-400 bg-slate-50 border border-slate-200 dark:text-white dark:placeholder-slate-500 dark:bg-slate-950/50 dark:border-slate-800 rounded-xl py-2.5 px-3 focus:outline-none focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 text-sm">
                </div>

                <!-- Corporate Email -->
                <div class="space-y-1">
                    <label for="email" class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Corporate Email</label>
                    <input type="email" id="email" th:field="*{email}" required
                           placeholder="e.g. manager@ecotrans.com"
                           pattern="^[A-Za-z0-9._%+-]+@(gmail\.com|[A-Za-z0-9.-]+\.[A-Za-z]{2,})$"
                           title="Email must be a valid address ending with @gmail.com or a registered corporate domain."
                           class="w-full text-slate-900 placeholder-slate-400 bg-slate-50 border border-slate-200 dark:text-white dark:placeholder-slate-500 dark:bg-slate-950/50 dark:border-slate-800 rounded-xl py-2.5 px-3 focus:outline-none focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 text-sm">
                </div>

                <!-- Password -->
                <div class="space-y-1">
                    <label for="password" class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Password</label>
                    <input type="password" id="password" th:field="*{password}" required
                           placeholder="••••••••"
                           pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,30}$"
                           title="Password must be 8-30 characters long and include at least one uppercase letter, one lowercase letter, one number, and one special character."
                           class="w-full text-slate-900 placeholder-slate-400 bg-slate-50 border border-slate-200 dark:text-white dark:placeholder-slate-500 dark:bg-slate-950/50 dark:border-slate-800 rounded-xl py-2.5 px-3 focus:outline-none focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 text-sm">
                </div>

                <button type="submit"
                        class="w-full mt-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-emerald-600/20 active:scale-[0.98] transition-all text-sm uppercase tracking-wider">
                    Submit Registration Request
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-slate-500 dark:text-slate-400">
                Already registered? <a th:href="@{/login}" class="text-emerald-600 dark:text-emerald-400 hover:underline font-semibold">Sign in here</a>.
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            var isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
    </script>
</body>
</html>
